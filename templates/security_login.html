<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Access | Portal</title>
    <style>
        :root {
            --security-navy: #0f172a;
            --security-blue: #1e293b;
            --accent-blue: #3b82f6;
            --text-light: #f8fafc;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--security-navy);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-light);
        }

        /* Access Card Styling */
        .login-container {
            background: rgba(30, 41, 59, 0.7);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(8px);
            text-align: center;
        }

        .security-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--accent-blue);
        }

        h3 {
            margin-bottom: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        p {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label {
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.5px;
        }

        input {
            padding: 14px;
            margin-bottom: 20px;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* Security Button */
        button {
            background-color: var(--accent-blue);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2563eb;
        }

        button:active {
            transform: scale(0.98);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="security-icon">🔒</div>
        <h3>Security Login</h3>
        <p>Authorized Personnel Only</p>

        <form action="/security_login" method="POST">
            <label for="username">Security Username</label>
            <input type="text" id="username" placeholder="Username" name="username" required>

            <label for="password">Security Password</label>
            <!-- Changed type to "password" for security -->
            <input type="password" id="password" placeholder="••••••••" name="password" required>

            <button type="submit">Verify Access</button>
        </form>

        <div class="footer-note">
            Secure Terminal Instance #2026-A
        </div>
    </div>

</body>
</html>
