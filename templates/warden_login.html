<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Login | Administration</title>
    <style>
        /* Modern Reset and Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            /* Distinct Warden Theme: Deep Navy/Slate Gradient */
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1e293b;
        }

        /* Container Styling */
        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h3 {
            font-size: 1.75rem;
            color: #0f172a;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.9rem;
            color: #64748b;
        }

        /* Form Layout */
        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        input {
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #334155;
            box-shadow: 0 0 0 3px rgba(51, 65, 85, 0.1);
        }

        /* Button Styling */
        button {
            background-color: #0f172a; /* Deep Slate */
            color: #ffffff;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #1e293b;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(0);
        }

        /* Back link */
        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            font-size: 0.85rem;
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #0f172a;
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header">
            <h3>Warden Login</h3>
            <p>Administration Access Portal</p>
        </div>

        <form action="/warden_login" method="POST">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Official Username" name="username" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" name="password" required>

            <button type="submit">Access Dashboard</button>
        </form>

        <div class="back-link">
            <a href="/">← Back to Selection</a>
        </div>
    </div>

</body>
</html>
