<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Add Warden</title>
    <style>
        :root {
            --primary-blue: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gray: #f1f5f9;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        .form-card {
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-dark);
            text-align: center;
        }

        .subtitle {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input {
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
            background-color: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* Submit Button */
        button[type="submit"] {
            background-color: var(--primary-blue);
            color: white;
            border: none;
        }

        button[type="submit"]:hover {
            background-color: var(--primary-hover);
        }

        /* Back Button */
        .btn-back {
            background-color: var(--white);
            color: var(--text-muted);
            border: 1px solid var(--border);
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-back:hover {
            background-color: #f8fafc;
            color: var(--text-dark);
            border-color: var(--text-muted);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h1>Add New Warden</h1>
        <p class="subtitle">System Administration Portal</p>

        <form action="/add_warden" method="POST">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="e.g. warden_01" required>

            <label for="password">Password</label>
            <!-- Changed to type="password" for security -->
            <input type="password" id="password" name="password" placeholder="••••••••" required>

            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter warden's full name" required>

            <div class="button-group">
                <a href="/" class="btn-back">Back</a>
                <button type="submit">Add Warden Profile</button>
            </div>
        </form>
    </div>

</body>
</html>
